name: Deploy to dev on the Server

on:
  push:
    branches:
      - dev

jobs:
  security:
    name: Security Scans
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      # ---------------------------
      # 1. CodeQL Scan
      # ---------------------------
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Build
        run: npm run build --if-present

      - name: Perform CodeQL Analysis
        id: codeql
        uses: github/codeql-action/analyze@v3

      # ---------------------------
      # 2. NPM Audit Scan
      # ---------------------------
      - name: Run npm audit
        id: npmaudit
        run: npm audit --audit-level=high

      # ---------------------------
      # 3. Create Issue if Scans Fail
      # ---------------------------
      - name: Save Failure Report
        if: failure()   # runs only if any previous step failed
        run: |
          echo "🚨 Security scan failed for commit $GITHUB_SHA" > security-failure.md
          echo "" >> security-failure.md
          echo "👉 Check details:" >> security-failure.md
          echo "- CodeQL results (if applicable): Security > Code scanning alerts tab" >> security-failure.md
          echo "- npm audit found vulnerable dependencies" >> security-failure.md
          echo "" >> security-failure.md
          echo "Triggered by: $GITHUB_ACTOR" >> security-failure.md
          echo "Branch: $GITHUB_REF_NAME" >> security-failure.md
          echo "Workflow: $GITHUB_WORKFLOW" >> security-failure.md

      - name: Create GitHub Issue
        if: failure()
        uses: peter-evans/create-issue-from-file@v4
        with:
          title: "Security Scan Failed 🚨"
          content-filepath: ./security-failure.md
          labels: security, bug

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: security
    if: needs.security.result == 'success'   # ✅ Deploy only if scans passed
    steps:
      - name: Update and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"
            cd /var/www/dev-win11React
            git checkout dev
            git pull origin dev
            npm install
            npm run build
            pm2 restart 0
            sudo systemctl reload nginx
